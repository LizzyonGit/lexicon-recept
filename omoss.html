<!doctype html>
<html lang="sv-SE" class="flex justify-center flex-col-md">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <meta name="description" content="Enkelt recept på pannkakor. Gör traditionella tunna pannkakor med detta enkla och goda pannkaksrecept.">
    <title>Om oss</title>
     

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" type="text/css" href="recept.css">

  </head>

  <body class="flex flex-col">
    <a href="#main" class="skip">Hoppa till huvudinnehållet</a>

    <nav>
      <div class="navbar">
        <ul class="flex align-items-center flex-col-md">
          <img class="logo" src="recept-logo.jpg" alt="Logo with cuttlery and a plate, text Söta köket">
          <li class="flex"><a href="recept.html">Alla recept</a></li>
          <li class="flex"><a href="omoss.html">Om oss</a></li>
          <li class="flex"><a href="index.html">Logga in</a></li>
        </ul>
      </div>
    </nav>
    <header>
      <div class="header-omoss"><h1>Det här är vi</h1></div>
    
      
      
    </header>
    <main id="main">
        <div class="omoss">
            <section><h2>Om oss</h2>
                <p>Välkommen till vår matlagningsplats! Vi är en grupp passionerade matlärare som delar våra favoritrecept med världen.</p>
            </section>
            <section>
                <h2>Kontakta oss</h2>
                <p>Har du frågor eller feedback? Kontakta oss gärna!</p>
            
            <form action="#" method="post">
                <div class="form-group">
                    <label for="name">Namn</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">E-post</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="message">Meddelande</label>
                    <textarea id="message" name="message" rows="6" placeholder="Berätta dina frågor eller feedback här..." required></textarea>
                </div>
                <button type="submit">Skicka</button>
            </form>
        </section>
        </div>


      
    </main>


    
  </body>

</html>
